# Production Docker Compose Override
# Use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# This adds production-specific configurations

version: '3.8'

services:
  api:
    # Production: Use more workers for better performance
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    # Remove volume mounts in production (use S3 instead)
    volumes:
      - ./uploads:/app/uploads:rw
    # Production environment overrides
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    # Restart policy
    restart: always
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    restart: always
    healthcheck:
      test: ["CMD", "rq", "info", "-u", "redis://redis:6379/0"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    # Production: Enable PostgreSQL logging
    command: postgres -c log_statement=all -c log_destination=stderr
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always

  redis:
    # Production: Enable persistence
    command: redis-server --appendonly yes
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: always
